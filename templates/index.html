<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>固定资产投资月度数据采集工具</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>固定资产投资月度数据采集工具</h1>

        <div class="section">
            <h2>数据源配置</h2>
            <label for="baseUrl">数据源网址：</label>
            <input type="text" id="baseUrl" value="{{ base_url }}" style="width: 400px;">
        </div>

        <div class="section">
            <h2>时间范围选择</h2>
            <div class="time-range">
                <div>
                    <label for="startYear">起始年：</label>
                    <select id="startYear">
                        {% for y in range(2000, current_year + 1) %}
                        <option value="{{ y }}" {% if y == start_year %}selected{% endif %}>{{ y }}</option>
                        {% endfor %}
                    </select>
                    <label for="startMonth">起始月：</label>
                    <select id="startMonth">
                        {% for m in range(1, 13) %}
                        <option value="{{ m }}" {% if m == start_month %}selected{% endif %}>{{ m }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="endYear">结束年：</label>
                    <select id="endYear">
                        {% for y in range(2000, current_year + 1) %}
                        <option value="{{ y }}" {% if y == end_year %}selected{% endif %}>{{ y }}</option>
                        {% endfor %}
                    </select>
                    <label for="endMonth">结束月：</label>
                    <select id="endMonth">
                        {% for m in range(1, 13) %}
                        <option value="{{ m }}" {% if m == end_month %}selected{% endif %}>{{ m }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>行业与关键词管理</h2>
            <div class="management">
                <div class="industry-panel">
                    <h3>行业列表</h3>
                    <ul id="industryList" class="list"></ul>
                    <div class="add-form">
                        <input type="text" id="newIndustry" placeholder="输入新行业名称">
                        <button onclick="addIndustry()">添加</button>
                    </div>
                </div>
                <div class="keyword-panel">
                    <h3>关键词列表</h3>
                    <div id="selectedIndustryName" style="color: #666; margin-bottom: 10px;">请先选择一个行业</div>
                    <ul id="keywordList" class="list"></ul>
                    <div class="add-form">
                        <input type="text" id="newKeyword" placeholder="输入新关键词" disabled>
                        <button onclick="addKeyword()" disabled id="addKeywordBtn">添加</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>操作</h2>
            <div class="buttons">
                <button onclick="startCrawl()" id="crawlBtn">开始采集</button>
                <button onclick="viewMatchReport()" id="viewReportBtn" disabled>查看匹配说明</button>
                <button onclick="resetConfig()">重置默认</button>
                <button onclick="clearLogs()">清空日志</button>
            </div>
            <div class="buttons" style="margin-top: 10px;">
                <button onclick="downloadCsv()" id="downloadCsvBtn" disabled>下载CSV</button>
                <button onclick="downloadReport()" id="downloadReportBtn" disabled>下载匹配说明</button>
            </div>
            <div class="buttons" style="margin-top: 10px;">
                <button onclick="exportConfig()" style="background-color: #2196F3;">导出配置</button>
                <label class="import-label" style="background-color: #2196F3; color: white; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px;">
                    导入配置
                    <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importConfig(event)">
                </label>
            </div>
        </div>

        <div class="section">
            <h2>操作日志</h2>
            <div id="logArea" class="log-area"></div>
        </div>
    </div>

    <div id="reportModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">×</span>
            <div id="reportContent"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
